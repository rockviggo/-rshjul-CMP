<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;overflow-x:hidden;}
.card{background:rgba(30,41,59,0.7);border-radius:16px;border:1px solid rgba(100,116,139,0.2);backdrop-filter:blur(12px);}
.fb{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:none;user-select:none;line-height:1.4;}
.fb.active{box-shadow:0 0 0 1.5px #0f172a,0 0 0 3px currentColor;}
.fb:hover{opacity:.8;}
.cnt{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;font-size:10px;font-weight:700;margin-left:3px;}
#wheelWrap{position:relative;width:100%;display:flex;justify-content:center;transition:all 0.6s cubic-bezier(.4,0,.2,1);overflow:hidden;}
#wheelInner{position:relative;width:780px;height:780px;transition:all 0.6s cubic-bezier(.4,0,.2,1);transform-origin:center center;}
.task-dot{position:absolute;border-radius:50%;cursor:pointer;transition:all .3s ease;z-index:10;}
.task-dot:hover{transform:scale(1.6);z-index:50;}
.task-dot.dimmed{opacity:.07;transform:scale(.5);pointer-events:none;}
.tooltip{display:none;position:absolute;background:#1e293b;color:white;padding:8px 12px;border-radius:8px;font-size:11px;z-index:100;pointer-events:none;max-width:260px;white-space:normal;line-height:1.4;}
.month-hit{position:absolute;cursor:pointer;z-index:5;opacity:0;}
.month-hit:hover{opacity:0.08;background:white;}

/* Zoom overlay */
#zoomOverlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:none;opacity:0;transition:opacity .4s ease;}
#zoomOverlay.show{display:flex;opacity:1;}
#zoomBg{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,0.92);backdrop-filter:blur(16px);}
#zoomContent{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:20px;}
#zoomHeader{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1100px;margin-bottom:16px;}
#zoomClose{background:rgba(100,116,139,0.3);border:1px solid rgba(148,163,184,0.3);color:#e2e8f0;border-radius:12px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
#zoomClose:hover{background:rgba(100,116,139,0.5);}
#zoomCanvas{position:relative;flex:1;width:100%;max-width:1100px;}
#zoomSvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;}
.zoom-popup{position:absolute;border-radius:12px;padding:10px 14px;font-size:12px;font-weight:500;line-height:1.5;z-index:4;pointer-events:auto;max-width:240px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.zoom-dot{position:absolute;border-radius:50%;z-index:5;box-shadow:0 0 12px rgba(255,255,255,0.2);}
.badge-sm{display:inline-block;padding:1px 6px;border-radius:6px;font-size:9px;font-weight:700;margin-left:4px;vertical-align:middle;}
</style>

const yC={kritisk:'#ef4444',admin:'#3b82f6',insp:'#22c55e',invit:'#eab308'};
const yBg={kritisk:'rgba(239,68,68,0.12)',admin:'rgba(59,130,246,0.12)',insp:'rgba(34,197,94,0.12)',invit:'rgba(234,179,8,0.12)'};
const yBdr={kritisk:'rgba(239,68,68,0.25)',admin:'rgba(59,130,246,0.25)',insp:'rgba(34,197,94,0.25)',invit:'rgba(234,179,8,0.25)'};
const yL={kritisk:'Kritisk info',admin:'Administrativt',insp:'Inspirasjon',invit:'Invitasjon/Event'};
const pL={rekr:'Rekruttering',ret:'Retention',tilf:'Tilfredshet'};
const mo=['Jan','Feb','Mar','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Des'];

let aY=new Set(['kritisk','admin','insp','invit']);
let aP=new Set(['rekr','ret','tilf']);
let aL=new Set(['Bachelor','Master','Prospekt','Alumni','-']);

const cx=390,cy=390;
const cv=document.getElementById('wc');
const xx=cv.getContext('2d');

function dw(){
  xx.clearRect(0,0,780,780);
  xx.globalAlpha=0.04;
  xx.beginPath();xx.arc(cx,cy,360,0,Math.PI*2);xx.fillStyle='#6366f1';xx.fill();
  xx.beginPath();xx.arc(cx,cy,280,0,Math.PI*2);xx.fillStyle='#0f172a';xx.fill();
  xx.beginPath();xx.arc(cx,cy,280,0,Math.PI*2);xx.fillStyle='#14b8a6';xx.fill();
  xx.beginPath();xx.arc(cx,cy,200,0,Math.PI*2);xx.fillStyle='#0f172a';xx.fill();
  xx.beginPath();xx.arc(cx,cy,200,0,Math.PI*2);xx.fillStyle='#f97316';xx.fill();
  xx.beginPath();xx.arc(cx,cy,120,0,Math.PI*2);xx.fillStyle='#0f172a';xx.fill();
  xx.globalAlpha=1;
  [360,280,200,120].forEach(r=>{xx.beginPath();xx.arc(cx,cy,r,0,Math.PI*2);xx.strokeStyle='rgba(148,163,184,0.15)';xx.lineWidth=1;xx.stroke();});
  xx.font='600 10px Inter,sans-serif';xx.textAlign='center';
  xx.fillStyle='#818cf8';xx.globalAlpha=.4;xx.fillText('REKRUTTERING',cx,cy-232);xx.globalAlpha=1;
  xx.fillStyle='#2dd4bf';xx.globalAlpha=.4;xx.fillText('RETENTION',cx,cy-152);xx.globalAlpha=1;
  xx.fillStyle='#fb923c';xx.globalAlpha=.4;xx.fillText('TILFREDSHET',cx,cy-72);xx.globalAlpha=1;
  for(let i=0;i<12;i++){const a=(i*30-90)*Math.PI/180;xx.beginPath();xx.moveTo(cx+Math.cos(a)*50,cy+Math.sin(a)*50);xx.lineTo(cx+Math.cos(a)*370,cy+Math.sin(a)*370);xx.strokeStyle='rgba(148,163,184,0.12)';xx.lineWidth=1;xx.stroke();}
  xx.font='700 12px Inter,sans-serif';xx.textAlign='center';xx.textBaseline='middle';
  for(let i=0;i<12;i++){const a=((i*30)+15-90)*Math.PI/180;xx.fillStyle='#94a3b8';xx.fillText(mo[i].toUpperCase(),cx+Math.cos(a)*375,cy+Math.sin(a)*375);}
  xx.beginPath();xx.arc(cx,cy,50,0,Math.PI*2);xx.fillStyle='#4f46e5';xx.fill();
  xx.font='700 16px Inter,sans-serif';xx.fillStyle='#fff';xx.fillText('2026',cx,cy);
}

const dE=[],tE=[];
function bd(){
  const dc=document.getElementById('dots'),tc=document.getElementById('tips');
  dc.innerHTML='';tc.innerHTML='';dE.length=0;tE.length=0;
  const mpc={};T.forEach(t=>{const k=t.m+'-'+t.p;mpc[k]=(mpc[k]||0)+1;});
  const mpi={};
  T.forEach((t,i)=>{
    const k=t.m+'-'+t.p;if(!mpi[k])mpi[k]=0;
    const ig=mpi[k]++,tg=mpc[k];
    let br=t.p==='rekr'?320:t.p==='ret'?240:160;
    const ms=(t.m-1)*30-90,sp=26/(tg+1),da=(ms+2+sp*(ig+1))*Math.PI/180;
    const rv=(ig%3-1)*18,r=br+rv;
    const px=cx+Math.cos(da)*r-5,py=cy+Math.sin(da)*r-5;
    const d=document.createElement('div');d.className='task-dot';
    d.style.cssText=`left:${px}px;top:${py}px;width:10px;height:10px;background:${yC[t.y]};box-shadow:0 0 8px ${yC[t.y]}66;`;
    const tp=document.createElement('div');tp.className='tooltip';
    tp.innerHTML=`<strong>${t.t}</strong><br>${yL[t.y]} | ${pL[t.p]}<br>${t.l} | ${t.k} | ${t.c}`;
    tp.style.cssText=`left:${px+16}px;top:${py-10}px;`;
    d.addEventListener('mouseenter',()=>{if(!d.classList.contains('dimmed'))tp.style.display='block';});
    d.addEventListener('mouseleave',()=>tp.style.display='none');
    dc.appendChild(d);tc.appendChild(tp);dE.push(d);tE.push(tp);
  });
}

// Build clickable month hit areas (wedge-shaped divs approximated)
function buildHitAreas(){
  const ha=document.getElementById('hitAreas');ha.innerHTML='';
  for(let i=0;i<12;i++){
    const a1=(i*30-90)*Math.PI/180;
    const a2=((i+1)*30-90)*Math.PI/180;
    const amid=(a1+a2)/2;
    // Create a circle hit area centered in the wedge
    const hr=210;
    const hx=cx+Math.cos(amid)*hr-40;
    const hy=cy+Math.sin(amid)*hr-40;
    const d=document.createElement('div');
    d.className='month-hit';
    d.style.cssText=`left:${hx}px;top:${hy}px;width:80px;height:80px;border-radius:50%;`;
    d.dataset.month=i+1;
    d.addEventListener('click',()=>openZoom(i+1));
    ha.appendChild(d);
  }
}

function iv(t){return aY.has(t.y)&&aP.has(t.p)&&aL.has(t.l);}

function af(){
  let vc=0;
  T.forEach((t,i)=>{
    const v=iv(t);if(v)vc++;
    if(dE[i]){dE[i].classList.toggle('dimmed',!v);tE[i].style.display='none';}
  });
  document.getElementById('vis').textContent=vc;
  const cn={kritisk:0,admin:0,insp:0,invit:0,rekr:0,ret:0,tilf:0,Bachelor:0,Master:0,Prospekt:0,Alumni:0,'-':0};
  T.forEach(t=>{if(iv(t)){cn[t.y]++;cn[t.p]++;cn[t.l]++;}});
  document.getElementById('cAll').textContent=vc;
  document.getElementById('cK').textContent=cn.kritisk;
  document.getElementById('cA').textContent=cn.admin;
  document.getElementById('cI').textContent=cn.insp;
  document.getElementById('cV').textContent=cn.invit;
  document.getElementById('cPA').textContent=vc;
  document.getElementById('cR').textContent=cn.rekr;
  document.getElementById('cRe').textContent=cn.ret;
  document.getElementById('cT').textContent=cn.tilf;
  document.getElementById('cLA').textContent=vc;
  document.getElementById('cLB').textContent=cn.Bachelor;
  document.getElementById('cLM').textContent=cn.Master;
  document.getElementById('cLP').textContent=cn.Prospekt;
  document.getElementById('cLAl').textContent=cn.Alumni;
  document.getElementById('cLU').textContent=cn['-'];
}

function tff(b){
  const fg=b.dataset.f,v=b.dataset.v;
  const set=fg==='type'?aY:fg==='pilar'?aP:aL;
  const avs=fg==='type'?['kritisk','admin','insp','invit']:fg==='pilar'?['rekr','ret','tilf']:['Bachelor','Master','Prospekt','Alumni','-'];
  if(v==='all'){
    if(avs.every(x=>set.has(x))){set.clear();document.querySelectorAll(`[data-f="${fg}"]`).forEach(b=>b.classList.remove('active'));}
    else{avs.forEach(x=>set.add(x));document.querySelectorAll(`[data-f="${fg}"]`).forEach(b=>b.classList.add('active'));}
  }else{
    if(set.has(v)){set.delete(v);b.classList.remove('active');}else{set.add(v);b.classList.add('active');}
    const ab=document.querySelector(`[data-f="${fg}"][data-v="all"]`);
    if(avs.every(x=>set.has(x)))ab.classList.add('active');else ab.classList.remove('active');
  }
  af();
}

function rf(){
  aY=new Set(['kritisk','admin','insp','invit']);
  aP=new Set(['rekr','ret','tilf']);
  aL=new Set(['Bachelor','Master','Prospekt','Alumni','-']);
  document.querySelectorAll('.fb').forEach(b=>b.classList.add('active'));
  af();
}

// ===== ZOOM =====
function openZoom(month){
  const items=T.filter(t=>t.m===month&&iv(t));
  if(!items.length)return;

  const ov=document.getElementById('zoomOverlay');
  document.getElementById('zoomTitle').textContent=mo[month-1]+' 2026';
  document.getElementById('zoomSub').textContent=items.length+' aktivitet'+(items.length>1?'er':'');

  const canvas=document.getElementById('zoomCanvas');
  const dotsC=document.getElementById('zoomDots');
  const popC=document.getElementById('zoomPopups');
  const svg=document.getElementById('zoomSvg');
  dotsC.innerHTML='';popC.innerHTML='';svg.innerHTML='';

  ov.style.display='flex';
  requestAnimationFrame(()=>{ov.classList.add('show');});

  // Wait for layout
  requestAnimationFrame(()=>{
    const rect=canvas.getBoundingClientRect();
    const W=rect.width,H=rect.height;
    const ccx=W/2,ccy=H/2;
    const maxR=Math.min(W,H)/2-20;

    // Draw arc background
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    const a1=((month-1)*30-90)*Math.PI/180;
    const a2=(month*30-90)*Math.PI/180;

    // Draw the slice
    const slicePath=document.createElementNS('http://www.w3.org/2000/svg','path');
    const r1=maxR*0.12,r2=maxR*0.95;
    const x1s=ccx+Math.cos(a1)*r1,y1s=ccy+Math.sin(a1)*r1;
    const x1e=ccx+Math.cos(a1)*r2,y1e=ccy+Math.sin(a1)*r2;
    const x2e=ccx+Math.cos(a2)*r2,y2e=ccy+Math.sin(a2)*r2;
    const x2s=ccx+Math.cos(a2)*r1,y2s=ccy+Math.sin(a2)*r1;
    slicePath.setAttribute('d',`M${x1s},${y1s} L${x1e},${y1e} A${r2},${r2} 0 0,1 ${x2e},${y2e} L${x2s},${y2s} A${r1},${r1} 0 0,0 ${x1s},${y1s}`);
    slicePath.setAttribute('fill','rgba(99,102,241,0.06)');
    slicePath.setAttribute('stroke','rgba(99,102,241,0.2)');
    slicePath.setAttribute('stroke-width','1.5');
    svg.appendChild(slicePath);

    // Ring lines
    [0.3,0.55,0.75].forEach(f=>{
      const rr=maxR*f;
      const arc=document.createElementNS('http://www.w3.org/2000/svg','path');
      const ax1=ccx+Math.cos(a1)*rr,ay1=ccy+Math.sin(a1)*rr;
      const ax2=ccx+Math.cos(a2)*rr,ay2=ccy+Math.sin(a2)*rr;
      arc.setAttribute('d',`M${ax1},${ay1} A${rr},${rr} 0 0,1 ${ax2},${ay2}`);
      arc.setAttribute('fill','none');arc.setAttribute('stroke','rgba(148,163,184,0.1)');arc.setAttribute('stroke-width','1');
      svg.appendChild(arc);
    });

    // Place dots on the arc
    const pilarR={rekr:0.82,ret:0.58,tilf:0.35};
    const dotPositions=[];

    // Group by pilar for spacing
    const byPilar={};
    items.forEach((t,i)=>{const p=t.p;if(!byPilar[p])byPilar[p]=[];byPilar[p].push({task:t,idx:i});});

    Object.keys(byPilar).forEach(p=>{
      const group=byPilar[p];
      const baseR=maxR*pilarR[p];
      const angleSpread=28;
      const aStart=((month-1)*30-90+1);
      const spacing=angleSpread/(group.length+1);
      group.forEach((item,gi)=>{
        const ang=(aStart+spacing*(gi+1))*Math.PI/180;
        const rVar=(gi%2===0?-12:12);
        const r=baseR+rVar;
        const dx=ccx+Math.cos(ang)*r;
        const dy=ccy+Math.sin(ang)*r;
        dotPositions.push({x:dx,y:dy,task:item.task});

        const dot=document.createElement('div');
        dot.className='zoom-dot';
        dot.style.cssText=`left:${dx-7}px;top:${dy-7}px;width:14px;height:14px;background:${yC[item.task.y]};box-shadow:0 0 16px ${yC[item.task.y]}88;`;
        dotsC.appendChild(dot);
      });
    });

    // Layout popups avoiding overlap
    const popups=[];
    const popW=220,popH=58;
    const usedRects=[];

    function overlaps(rx,ry,rw,rh){
      for(const u of usedRects){
        if(!(rx+rw<u.x||rx>u.x+u.w||ry+rh<u.y||ry>u.y+u.h))return true;
      }
      return false;
    }

    dotPositions.forEach((dp,i)=>{
      // Try positions: right, left, above, below, further out
      const offsets=[
        {ox:30,oy:-popH/2},{ox:-popW-30,oy:-popH/2},
        {ox:-popW/2,oy:-popH-25},{ox:-popW/2,oy:25},
        {ox:50,oy:-popH-10},{ox:50,oy:20},
        {ox:-popW-50,oy:-popH-10},{ox:-popW-50,oy:20},
        {ox:80,oy:-popH/2},{ox:-popW-80,oy:-popH/2},
        {ox:30,oy:-popH-40},{ox:30,oy:40},
        {ox:-popW/2,oy:-popH-50},{ox:-popW/2,oy:55},
      ];
      let px=dp.x+30,py=dp.y-popH/2;
      for(const o of offsets){
        const tx=dp.x+o.ox,ty=dp.y+o.oy;
        if(tx>5&&tx+popW<W-5&&ty>5&&ty+popH<H-5&&!overlaps(tx,ty,popW,popH)){
          px=tx;py=ty;break;
        }
      }
      usedRects.push({x:px,y:py,w:popW,h:popH});

      const t=dp.task;
      const pop=document.createElement('div');
      pop.className='zoom-popup';
      pop.style.cssText=`left:${px}px;top:${py}px;width:${popW}px;background:${yBg[t.y]};border-color:${yBdr[t.y]};`;
      pop.innerHTML=`<div style="color:${yC[t.y]};font-weight:700;font-size:13px;margin-bottom:2px;">${t.t}</div>
        <div style="color:rgba(226,232,240,0.7);font-size:11px;">${pL[t.p]} <span class="badge-sm" style="background:${yBdr[t.y]};color:${yC[t.y]}">${t.l}</span> <span style="color:rgba(148,163,184,0.6)">via ${t.k}</span></div>`;
      popC.appendChild(pop);

      // Draw connector line
      const pcx=px+(dp.x<px?0:popW);
      const pcy=py+popH/2;
      const dist=Math.sqrt((pcx-dp.x)**2+(pcy-dp.y)**2);
      if(dist>35){
        const line=document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1',dp.x);line.setAttribute('y1',dp.y);
        line.setAttribute('x2',pcx);line.setAttribute('y2',pcy);
        line.setAttribute('stroke',yC[t.y]);line.setAttribute('stroke-width','1');
        line.setAttribute('stroke-opacity','0.3');line.setAttribute('stroke-dasharray','4,3');
        svg.appendChild(line);
      }
    });
  });
}

function closeZoom(){
  const ov=document.getElementById('zoomOverlay');
  ov.classList.remove('show');
  setTimeout(()=>{ov.style.display='none';},400);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeZoom();});

// Init
dw();bd();buildHitAreas();af();
</script>
